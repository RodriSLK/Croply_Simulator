<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Croply Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f8fb; color: #1f2937; }
    header { background: #14532d; color: white; padding: 1rem 2rem; }
    main { padding: 1rem 2rem 2rem; }
    .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 1rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 0.6rem; text-align: left; }
    button { background: #2563eb; color: white; border: none; border-radius: 4px; padding: 0.5rem 0.8rem; cursor: pointer; }
    .pill { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 999px; background: #dcfce7; color: #166534; font-size: 0.85rem; }
    .muted { color: #6b7280; font-size: 0.92rem; }
    details { margin-top: 0.5rem; }
    pre { background: #111827; color: #f9fafb; padding: 0.8rem; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <header>
    <h1>Croply Simulator</h1>
    <p class="muted">Panel funcional del simulador de parcelas y sensores</p>
  </header>
  <main>
    <section class="card">
      <h2>Estado global</h2>
      <div id="status"></div>
    </section>

    <section class="card">
      <h2>Parcelas</h2>
      <table>
        <thead>
          <tr><th>Parcela</th><th>Estado</th><th>Últimos valores</th><th>Acciones</th></tr>
        </thead>
        <tbody id="parcelas-body"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Log de acciones</h2>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const state = { status: null, parcels: [] };
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const tableBody = document.getElementById('parcelas-body');

    function appendLog(message) {
      const stamp = new Date().toLocaleTimeString();
      logEl.textContent = `[${stamp}] ${message}\n` + logEl.textContent;
    }

    async function loadStatus() {
      const response = await fetch('/status');
      const data = await response.json();
      state.status = data;
      statusEl.innerHTML = `
        <p><strong>Scheduler:</strong> ${data.scheduler_activo ? 'activo' : 'inactivo'}</p>
        <p><strong>Última ejecución:</strong> ${data.ultima_ejecucion ? new Date(data.ultima_ejecucion).toLocaleString() : 'sin datos'}</p>
        <p><strong>Próxima ejecución:</strong> ${data.proxima_ejecucion ? new Date(data.proxima_ejecucion).toLocaleString() : 'sin datos'}</p>
        <p><strong>Parcelas activas:</strong> ${data.parcelas_activas}</p>
      `;
      appendLog(`Estado global actualizado (${data.parcelas_activas} parcelas activas)`);
    }

    async function loadParcels() {
      const response = await fetch('/parcelas');
      const data = await response.json();
      state.parcels = data.parcelas || [];
      tableBody.innerHTML = '';
      if (state.parcels.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4">No hay parcelas cargadas.</td></tr>';
        return;
      }
      state.parcels.forEach((parcela) => {
        const row = document.createElement('tr');
        const sensorSummary = (parcela.controladores || []).flatMap((ctrl) => ctrl.sensores || [])
          .slice(0, 3)
          .map((sensor) => `${sensor.tipo}: ${sensor.valor_actual ?? 'n/a'}`)
          .join('<br/>');
        row.innerHTML = `
          <td>${parcela.nombre}</td>
          <td><span class="pill">${parcela.activa ? 'Activa' : 'Inactiva'}</span></td>
          <td>${sensorSummary || 'Sin datos'}</td>
          <td>
            <button class="evento-btn" data-id="${parcela.parcela_id}">Disparar evento</button>
            <details>
              <summary>Historial</summary>
              <div class="history-${parcela.parcela_id}">Cargando...</div>
            </details>
          </td>
        `;
        tableBody.appendChild(row);
        loadHistory(parcela.parcela_id);
      });
    }

    async function loadHistory(parcelaId) {
      try {
        const response = await fetch(`/parcelas/${parcelaId}/lecturas?limit=5`);
        const data = await response.json();
        const target = document.querySelector(`.history-${parcelaId}`);
        if (!target) return;
        const items = (data.lecturas || []).slice(0, 5).map((lectura) => `${lectura.timestamp} · ${lectura.tipo_sensor}: ${lectura.valor}`).join('<br/>');
        target.innerHTML = items || 'Sin lecturas aún';
      } catch (err) {
        const target = document.querySelector(`.history-${parcelaId}`);
        if (target) target.innerHTML = 'No se pudo cargar el historial';
      }
    }

    document.addEventListener('click', async (event) => {
      const button = event.target.closest('.evento-btn');
      if (!button) return;
      const parcelaId = button.getAttribute('data-id');
      const response = await fetch(`/parcelas/${parcelaId}/eventos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo: 'RIEGO', parametros: { mm: 10 } })
      });
      if (response.ok) {
        appendLog(`Evento manual creado para la parcela ${parcelaId}`);
      } else {
        appendLog(`No se pudo crear el evento para la parcela ${parcelaId}`);
      }
    });

    loadStatus();
    loadParcels();
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
